name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      # Network to CoinGecko/MetalPrice is blocked in-test (e2e/fixtures.ts) so the
      # run is deterministic; the webServer builds + previews the production bundle.
      - name: Run smoke E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Fails on errors only; 1 known warning in StrategyDashboard.tsx (react-hooks/exhaustive-deps).
      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Coverage gate (src/lib ≥ 70%)
        run: npm run test:coverage

      - name: Create env file from secrets
        if: github.event_name != 'pull_request'
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env.local
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env.local

      - name: Build
        run: npm run build

      - name: Add cache-busting meta tags
        if: github.event_name != 'pull_request'
        run: |
          sed -i 's|<head>|<head>\n  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n  <meta http-equiv="Pragma" content="no-cache">\n  <meta http-equiv="Expires" content="0">|' dist/index.html

      - name: Upload build artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          name: goldtrackr-dist
          path: dist/
          retention-days: 30

      - name: Check deploy prerequisites
        id: deploy
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PATH: ${{ secrets.SSH_PATH }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ] || [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_PATH" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping SSH deploy — set SSH_PRIVATE_KEY, SSH_HOST, SSH_USER, and SSH_PATH repository secrets to enable."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH deploy key
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && steps.deploy.outputs.enabled == 'true'
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && steps.deploy.outputs.enabled == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to server
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && steps.deploy.outputs.enabled == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PATH: ${{ secrets.SSH_PATH }}
        run: |
          rsync -avz --delete \
            -e ssh \
            dist/ \
            "$SSH_USER@$SSH_HOST:$SSH_PATH/"
